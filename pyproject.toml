[tool.ruff]
line-length = 120
target-version = "py38"

[tool.ruff.lint]
# pycodestyle errors/warnings, pyflakes, isort, pyupgrade, flake8-bugbear.
select = ["E", "W", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Put the repo root on sys.path so `import src...` resolves under a bare
# `pytest` invocation (CI), not just `python -m pytest` which adds the cwd.
pythonpath = ["."]
