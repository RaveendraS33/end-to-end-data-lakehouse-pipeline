services:
  kafka:
    image: apache/kafka:latest
    container_name: lakehouse-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - lakehouse-net

  kafka-init:
    image: apache/kafka:latest
    container_name: lakehouse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - .env
    command:
      [
        "/bin/bash",
        "-c",
        "/opt/kafka/bin/kafka-topics.sh --bootstrap-server $$KAFKA_BOOTSTRAP_SERVERS --create --if-not-exists --topic $$KAFKA_TOPIC --partitions 3 --replication-factor 1"
      ]
    networks:
      - lakehouse-net

  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse-net

  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb -p local/$$MINIO_BUCKET;
      mc anonymous set none local/$$MINIO_BUCKET;
      "
    networks:
      - lakehouse-net

  iceberg-postgres:
    image: postgres:16-alpine
    container_name: lakehouse-iceberg-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - iceberg-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse-net

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: lakehouse-iceberg-rest
    depends_on:
      minio-init:
        condition: service_completed_successfully
      iceberg-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      CATALOG_URI: jdbc:postgresql://iceberg-postgres:5432/${POSTGRES_DB}
      CATALOG_JDBC_USER: ${POSTGRES_USER}
      CATALOG_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
    ports:
      - "8181:8181"
    networks:
      - lakehouse-net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: lakehouse-api
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - lakehouse-net

  spark:
    build:
      context: .
      dockerfile: spark_jobs/Dockerfile
    container_name: lakehouse-spark
    depends_on:
      iceberg-rest:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION}
    volumes:
      - ./spark_jobs:/app/spark_jobs
      - ./src:/app/src
    command:
      [
        "/opt/spark/bin/spark-submit",
        "--packages",
        "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.6,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.iceberg:iceberg-aws-bundle:1.5.2,org.apache.hadoop:hadoop-aws:3.3.4",
        "spark_jobs/stream_transactions_to_iceberg.py"
      ]
    networks:
      - lakehouse-net

  spark-backfill:
    build:
      context: .
      dockerfile: spark_jobs/Dockerfile
    container_name: lakehouse-spark-backfill
    profiles:
      - tools
    depends_on:
      iceberg-rest:
        condition: service_started
    env_file:
      - .env
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION}
      BACKFILL_PATH: /app/seed/backfill_sample.jsonl
    volumes:
      - ./spark_jobs:/app/spark_jobs
      - ./src:/app/src
      - ./seed:/app/seed
    command:
      [
        "/opt/spark/bin/spark-submit",
        "--packages",
        "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.6,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.iceberg:iceberg-aws-bundle:1.5.2,org.apache.hadoop:hadoop-aws:3.3.4",
        "spark_jobs/backfill_transactions.py"
      ]
    networks:
      - lakehouse-net

  trino:
    image: trinodb/trino:latest
    container_name: lakehouse-trino
    depends_on:
      iceberg-rest:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    networks:
      - lakehouse-net

  airflow:
    image: apache/airflow:2.10.5-python3.11
    container_name: lakehouse-airflow
    profiles:
      - orchestration
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    ports:
      - "8088:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    command: standalone
    networks:
      - lakehouse-net

volumes:
  minio-data:
  iceberg-postgres-data:

networks:
  lakehouse-net:
    driver: bridge
